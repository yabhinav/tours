<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lake District Route Map (With Parking + Times)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }
  .day-label { font-weight: bold; }
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>


<script>
// Apple Maps link helper
function apple(lat, lon, label) {
  return `https://maps.apple.com/?ll=${lat},${lon}&q=${encodeURIComponent(label)}`;
}
function gmaps(lat, lon, label) {
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lon}&query_place_id=${encodeURIComponent(label)}`;
}

// Map init
const map = L.map('map').setView([54.47, -3.02], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// =========================================================
//  COLOUR CODING
// =========================================================
const colours = {
  "Start": "black",
  "Day 1": "red",
  "Day 2": "blue",
  "Day 3": "green",
  "Day 4": "orange"
};

// =========================================================
//  MAIN ROUTE POINTS (Top Parking Spots Only)
//  These will be connected by the polyline
// =========================================================
const routePoints = [
  // Start
  {name:"Poppy Farm, Selside", day:"Start", time:"Stay", lat:54.381, lon:-2.708},

  // DAY 1
  {name:"Dowkers Lane Car Park (Kendal)", day:"Day 1", time:"1.5–2 hrs", lat:54.326, lon:-2.748},

  // DAY 2
  {name:"Braithwaite Fold Car Park (Bowness)", day:"Day 2", time:"1–1.5 hrs", lat:54.366, lon:-2.922},
  {name:"Broad Street Car Park (Windermere)", day:"Day 2", time:"1 hr", lat:54.379, lon:-2.907},
  {name:"Windermere Station Car Park (Orrest Head)", day:"Day 2", time:"45–60 mins", lat:54.381, lon:-2.9},
  {name:"Rydal Road Car Park (Ambleside)", day:"Day 2", time:"1–1.5 hrs", lat:54.431, lon:-2.968},
  {name:"Stock Ghyll Lane Parking", day:"Day 2", time:"45 mins", lat:54.433, lon:-2.958},
  {name:"Broadgate Meadow Car Park (Grasmere)", day:"Day 2", time:"1 hr", lat:54.457, lon:-3.025},
  {name:"Aira Force NT Main Car Park", day:"Day 2", time:"1–1.5 hrs", lat:54.577, lon:-2.947},

  // DAY 3 (Corrected)
  {name:"Pelter Bridge Car Park (Rydal Cave)", day:"Day 3", time:"1 hr", lat:54.447, lon:-2.987},
  {name:"Castlerigg Stone Circle Parking", day:"Day 3", time:"30–45 mins", lat:54.603, lon:-3.096},
  {name:"Lakeside Car Park (Keswick)", day:"Day 3", time:"1–2 hrs", lat:54.595, lon:-3.137},

  // NEW: Keswick → Embleton (Night 3)
  {name:"Hill Farm B&B (Embleton)", day:"Day 3", time:"Stay", lat:54.6625, lon:-3.2920},

  // DAY 4 (Corrected start point)
  {name:"Buttermere NT Car Park", day:"Day 4", time:"1–1.5 hrs", lat:54.543, lon:-3.279},
  {name:"Wasdale Head Car Park", day:"Day 4", time:"1 hr", lat:54.464, lon:-3.268},
  {name:"Wastwater Lake Shore Parking", day:"Day 4", time:"45–60 mins", lat:54.447, lon:-3.283},
  {name:"Calgarth Park Parking", day:"Day 4", time:"Stay", lat:54.392, lon:-2.93}


];

const routeColours = {
  "Day 1": "red",
  "Day 2": "blue",
  "Day 3": "green",
  "Day 4": "orange"
};

const dayBase = {
  "Day 1": L.latLng(54.381, -2.708),      // Poppy Farm
  "Day 2": L.latLng(54.381, -2.708),      // Poppy Farm
  "Day 3": L.latLng(54.6625, -3.2920),    // Embleton
  "Day 4": L.latLng(54.392, -2.93)        // Calgarth Park
};

const daySegments = {
  "Day 1": [],
  "Day 2": [],
  "Day 3": [],
  "Day 4": []
};

// Build segments
for (let i = 0; i < routePoints.length - 1; i++) {
  const current = routePoints[i];
  const next = routePoints[i + 1];

  if (current.day === next.day) {
    daySegments[current.day].push([
      L.latLng(current.lat, current.lon),
      L.latLng(next.lat, next.lon)
    ]);
  }
}

// MANUAL FIXES FOR DAY STARTS
// Day 1: Selside → Kendal
daySegments["Day 1"].unshift([
  L.latLng(54.381, -2.708),   // Selside
  L.latLng(54.326, -2.748)    // Kendal
]);

// Day 2: Selside → Bowness
daySegments["Day 2"].unshift([
  L.latLng(54.381, -2.708),   // Selside
  L.latLng(54.366, -2.922)    // Bowness
]);


// Add return-to-base segment for each day
Object.keys(daySegments).forEach(day => {
  if (daySegments[day].length > 0) {
    const lastSegment = daySegments[day][daySegments[day].length - 1];
    const lastPoint = lastSegment[1]; // end of last segment
    daySegments[day].push([
      lastPoint,
      dayBase[day]
    ]);
  }
});


// =========================================================
//  SECONDARY PARKING SPOTS (Not connected to polyline)
// =========================================================
const secondaryParking = [
  // Kendal
  {name:"Boots Car Park (Kendal)", day:"Day 1", lat:54.327, lon:-2.749},
  {name:"South Lakeland House Car Park (Kendal)", day:"Day 1", lat:54.326, lon:-2.744},

  // Bowness
  {name:"Rayrigg Road Car Park", day:"Day 2", lat:54.366, lon:-2.922},
  {name:"Glebe Road Car Park", day:"Day 2", lat:54.364, lon:-2.922},

  // Windermere
  {name:"Victoria Street Car Park", day:"Day 2", lat:54.379, lon:-2.905},
  {name:"Windermere Library Car Park", day:"Day 2", lat:54.38, lon:-2.91},

  // Orrest Head
  {name:"Orrest Head Car Park", day:"Day 2", lat:54.382, lon:-2.901},
  {name:"Church Street Car Park", day:"Day 2", lat:54.381, lon:-2.903},

  // Ambleside
  {name:"Lake Road Car Park", day:"Day 2", lat:54.43, lon:-2.963},
  {name:"King Street Car Park", day:"Day 2", lat:54.431, lon:-2.965},

  // Stock Ghyll
  {name:"Nook Lane Car Park", day:"Day 2", lat:54.433, lon:-2.957},
  {name:"Rydal Road Car Park (Alt)", day:"Day 2", lat:54.431, lon:-2.968},

  // Grasmere
  {name:"Red Bank Road Car Park", day:"Day 2", lat:54.46, lon:-3.02},
  {name:"Stock Lane Car Park", day:"Day 2", lat:54.458, lon:-3.02},

  // Aira Force
  {name:"Aira Force Upper Car Park", day:"Day 2", lat:54.577, lon:-2.948},
  {name:"Glencoyne Bay Car Park", day:"Day 2", lat:54.58, lon:-2.95},

  // Rydal Cave
  {name:"White Moss Car Park", day:"Day 3", lat:54.45, lon:-2.99},
  {name:"Rydal Hall Car Park", day:"Day 3", lat:54.45, lon:-2.985},

  // Castlerigg
  {name:"Thirlmere Roadside Parking", day:"Day 3", lat:54.6, lon:-3.1},
  {name:"Keswick Rugby Club Parking", day:"Day 3", lat:54.6, lon:-3.13},

  // Keswick
  {name:"Central Car Park", day:"Day 3", lat:54.6, lon:-3.13},
  {name:"Bell Close Car Park", day:"Day 3", lat:54.6, lon:-3.14},

  // Borrowdale
  {name:"Seatoller Car Park", day:"Day 3", lat:54.53, lon:-3.15},
  {name:"Kettlewell Car Park", day:"Day 3", lat:54.53, lon:-3.14},

  // Honister
  {name:"Honister Pass Summit Lay-by", day:"Day 3", lat:54.53, lon:-3.17},
  {name:"Gatesgarth Car Park", day:"Day 3", lat:54.543, lon:-3.28},

  // Buttermere
  {name:"Crummock Water Car Park", day:"Day 3", lat:54.55, lon:-3.29},
  {name:"Gatesgarth Car Park (Alt)", day:"Day 3", lat:54.543, lon:-3.28},

  // Cockermouth
  {name:"Sainsbury’s Car Park", day:"Day 3", lat:54.66, lon:-3.36},
  {name:"Kirkgate Car Park", day:"Day 3", lat:54.66, lon:-3.36},

  // Wasdale
  {name:"Brackenclose Car Park", day:"Day 4", lat:54.46, lon:-3.27},
  {name:"Wastwater Overlook Parking", day:"Day 4", lat:54.45, lon:-3.28},

  // Wastwater
  {name:"Nether Wasdale Car Park", day:"Day 4", lat:54.45, lon:-3.27},
  {name:"Greendale Car Park", day:"Day 4", lat:54.45, lon:-3.26},

  // Calgarth Park
  {name:"Brockhole Visitor Centre Parking", day:"Day 4", lat:54.39, lon:-2.93},
  {name:"Waterhead Car Park", day:"Day 4", lat:54.43, lon:-2.96}
];

// =========================================================
//  ADD MAIN ROUTE MARKERS + POLYLINE
// =========================================================
const latlngs = [];

routePoints.forEach((p) => {
  const marker = L.circleMarker([p.lat, p.lon], {
    radius: 8,
    color: colours[p.day],
    fillColor: colours[p.day],
    fillOpacity: 0.9
  }).addTo(map);

  marker.bindPopup(`
    <b style="color:${colours[p.day]}">${p.day}</b><br>
    ${p.name}<br>
    <i>${p.time}</i><br>
    <a href="${apple(p.lat, p.lon, p.name)}" target="_blank">Apple Maps</a><br>
    <a href="${gmaps(p.lat, p.lon, p.name)}" target="_blank">Google Maps</a>
  `);

  latlngs.push([p.lat, p.lon]);
});

Object.keys(daySegments).forEach(day => {
  daySegments[day].forEach(segment => {
    L.Routing.control({
      waypoints: segment,
      lineOptions: {
        styles: [{ color: routeColours[day], weight: 5, opacity: 0.9 }]
      },
      addWaypoints: false,
      draggableWaypoints: false,
      routeWhileDragging: false,
      show: false
    }).addTo(map);
  });
});



// =========================================================
//  ADD SECONDARY PARKING MARKERS
// =========================================================
secondaryParking.forEach((p) => {
  const marker = L.circleMarker([p.lat, p.lon], {
    radius: 5,
    color: colours[p.day],
    fillColor: colours[p.day],
    fillOpacity: 0.5
  }).addTo(map);

  marker.bindPopup(`
    <b style="color:${colours[p.day]}">${p.day}</b><br>
    ${p.name}<br>
    <a href="${apple(p.lat, p.lon, p.name)}" target="_blank">Apple Maps</a><br>
    <a href="${gmaps(p.lat, p.lon, p.name)}" target="_blank">Google Maps</a>
  `);
});

// Fit map to route
map.fitBounds(latlngs);
</script>
</body>
</html>
