// ------------------------------------------------------------
// HELPER: DISTANCE CALCULATION
// ------------------------------------------------------------
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2) *
            Math.sin(Δλ/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ------------------------------------------------------------
// ADD PARKING MARKERS

parkingLocations.forEach(p => {
  const colour = parkingColours[p.type] || "maroon";

  const marker = L.circleMarker([p.lat, p.lon], {
    pane: 'markers',
    radius: 7,
    color: colour,
    fillColor: colour,
    fillOpacity: 0.9
  });

  const codeLine = p.code ? `<br>Code: ${p.code}` : "";

  marker.bindPopup(`
    <b style="color:${colour}">${p.name}</b><br>
    Type: ${p.type}${codeLine}<br><br>
    <a href="https://maps.apple.com/?q=${p.lat},${p.lon}" target="_blank">Apple Maps</a><br>
    <a href="https://www.google.com/maps?q=${p.lat},${p.lon}" target="_blank">Google Maps</a>
  `);

  clusterGroup.addLayer(marker);
});



// ------------------------------------------------------------
// ADD TOURIST MARKERS WITH PARKING + WHAT TO DO + RECOMMENDED TIME
// ------------------------------------------------------------
touristDestinations.forEach(dest => {

  // Find nearby parking (tight radius)
  let nearby = parkingLocations
    .map(p => ({
      ...p,
      dist: distance(dest.lat, dest.lon, p.lat, p.lon)
    }))
    .filter(p => p.dist < 2000) // 2 km radius
    .sort((a, b) => {
      // Supermarket first
      if (a.type === "Supermarket" && b.type !== "Supermarket") return -1;
      if (b.type === "Supermarket" && a.type !== "Supermarket") return 1;
      // Then by distance
      return a.dist - b.dist;
    });

  let parkingList = nearby.map(p => {
    const meters = Math.round(p.dist);
    const mins = Math.round(meters / 80);
    return `${p.name} — ${meters} m (${mins} min)`;
  }).join("<br>");

  const recTime = recommendedTimes[dest.name] || "Not specified";
  const whatToDo = activityDescriptions[dest.name] || "Enjoy the surroundings, take a short walk, and move on whenever you’re ready.";

  const marker = L.marker([dest.lat, dest.lon], {
    icon: pinIcon(dayColours[dest.day]),
    pane: 'markers'
  });

  marker.bindPopup(`
    <b style="color:${dayColours[dest.day]}">${dest.day} — Rank #${dest.rank}</b><br>
    <b>${dest.name}</b><br>
    <i>Area:</i> ${dest.area}<br><br>
    <i>Parking options (Supermarket first):</i><br>
    ${parkingList || "No nearby parking listed within 2 km."}<br><br>
    <b style="color:${dayColours[dest.day]}">What to do here:</b><br>
    ${whatToDo}<br><br>
    <b style="color:${dayColours[dest.day]}">Recommended time:</b> ${recTime}
  `);

  clusterGroup.addLayer(marker);
});

function roadRoute(points, day, dash = false) {
  L.Routing.control({
    waypoints: points.map(p => L.latLng(p[0], p[1])),
    lineOptions: {
      styles: [{
        color: routeColours[day],
        weight: dash ? 4 : 5,
        opacity: dash ? 0.7 : 0.9,
        dashArray: dash ? '8 8' : null
      }]
    },
    addWaypoints: false,
    draggableWaypoints: false,
    fitSelectedRoutes: false,
    show: false,
    routeWhileDragging: false,
    createMarker: () => null
  }).addTo(map);
}

// DANGER ROADS (RED + ⚠️ MARKERS) – TO AVOID

function drawDangerRoad(name, waypoints) {
  L.Routing.control({
    waypoints: waypoints.map(p => L.latLng(p[0], p[1])),
    lineOptions: {
      styles: [{ color: dangerColour, weight: 6, opacity: 0.9 }]
    },
    addWaypoints: false,
    draggableWaypoints: false,
    fitSelectedRoutes: false,
    show: false,
    routeWhileDragging: false,
    createMarker: () => null
  }).addTo(map);

  const mid = waypoints[Math.floor(waypoints.length / 2)];
  const marker = L.marker(mid, { icon: warningIcon });
  marker.bindPopup(`
    <b style="color:${dangerColour}">⚠️ Danger Road</b><br>
    ${name}<br><br>
    Steep / narrow / not recommended for new drivers.<br>
    <b>AVOID this road.</b>
  `);
  marker.addTo(map);
}
