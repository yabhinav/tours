<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>5‑Day Wales & Cotswolds Road Trip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .day-legend {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 8px 10px;
      border-radius: 6px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .day-legend div {
      margin: 2px 0;
    }
    .legend-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="day-legend">
    <strong>5‑Day Route</strong><br />
    <div><span class="legend-color" style="background:#e41a1c;"></span>Day 1: MK → Cotswolds → Cardiff</div>
    <div><span class="legend-color" style="background:#377eb8;"></span>Day 2: Cardiff → Pembrokeshire</div>
    <div><span class="legend-color" style="background:#4daf4a;"></span>Day 3: Pembrokeshire → Snowdonia</div>
    <div><span class="legend-color" style="background:#984ea3;"></span>Day 4: Snowdonia → Elan Valley / Brecon</div>
    <div><span class="legend-color" style="background:#ff7f00;"></span>Day 5: Brecon / Crickhowell → MK</div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // Base map
    var map = L.map('map');

    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // --- Coordinates (approximate, good enough for trip map) ---

    // Milton Keynes
    var mk = [52.0406, -0.7594];

    // Cotswolds
    var broadwayTower = [52.0339, -1.8224];
    var bourton = [51.8853, -1.7560];
    var stow = [51.9300, -1.7220];
    var bibury = [51.7614, -1.8360];

    // Cardiff & nearby
    var cardiffBay = [51.4634, -3.1655];
    var penarthPier = [51.4384, -3.1734];

    // Pembrokeshire
    var newgale = [51.8395, -5.1080];
    var solva = [51.8720, -5.1920];
    var stDavids = [51.8820, -5.2680];
    var stDavidsHead = [51.9005, -5.3000];
    var porthgain = [51.9390, -5.1890];
    var blueLagoon = [51.9395, -5.2050]; // Abereiddy
    var strumbleHead = [52.0130, -5.0670];

    // Snowdonia & North Wales
    var aberglaslyn = [52.9970, -4.1060];
    var beddgelert = [53.0160, -4.1020];
    var nantGwynant = [53.0300, -4.0850];
    var llynDinas = [53.0260, -4.0890];
    var capelCurig = [53.1020, -3.9340];
    var llynOgwen = [53.1400, -3.9970];
    var llandudno = [53.3240, -3.8270];
    var conwyCastle = [53.2800, -3.8250];

    // Mid Wales / Elan / Brecon
    var cadairIdris = [52.7040, -3.9100];
    var elanValley = [52.2660, -3.5400];
    var rhayader = [52.3010, -3.5050];
    var brecon = [51.9470, -3.3910];
    var hayBluff = [52.0200, -3.0900];
    var crickhowell = [51.8590, -3.1380];

    // --- Day 1: MK → Cotswolds → Cardiff (red) ---
    var day1Coords = [
      mk,
      broadwayTower,
      bourton,
      stow,
      bibury,
      cardiffBay
    ];

    var day1Line = L.polyline(day1Coords, {
      color: '#e41a1c',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    // Markers Day 1
    L.marker(mk).addTo(map).bindPopup(
      "<b>Milton Keynes</b><br>Start 9–10 AM.<br><a href='https://maps.apple.com/?q=Milton+Keynes' target='_blank'>Apple Maps</a> | <a href='https://www.google.com/maps/search/?api=1&query=Milton+Keynes' target='_blank'>Google Maps</a>"
    );

    L.marker(broadwayTower).addTo(map).bindPopup(
      "<b>Broadway Tower</b><br>Cotswolds viewpoint, great first stop.<br>~1h20 from MK."
    );

    L.marker(bourton).addTo(map).bindPopup(
      "<b>Bourton‑on‑the‑Water</b><br>Brunch & riverside walk."
    );

    L.marker(stow).addTo(map).bindPopup(
      "<b>Stow‑on‑the‑Wold</b><br>Market square, short wander."
    );

    L.marker(bibury).addTo(map).bindPopup(
      "<b>Bibury (Arlington Row)</b><br>Iconic cottages, quick photo stop."
    );

    L.marker(cardiffBay).addTo(map).bindPopup(
      "<b>Cardiff Bay</b><br>Night 1 stay area.<br>Waterfront, restaurants, easy parking."
    );

    // --- Day 2: Cardiff → Pembrokeshire (blue) ---
    var day2Coords = [
      cardiffBay,
      penarthPier,
      newgale,
      solva,
      stDavids,
      stDavidsHead,
      porthgain,
      blueLagoon,
      strumbleHead
    ];

    var day2Line = L.polyline(day2Coords, {
      color: '#377eb8',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    L.marker(penarthPier).addTo(map).bindPopup(
      "<b>Penarth Pier</b><br>Optional morning stroll before heading west."
    );

    L.marker(newgale).addTo(map).bindPopup(
      "<b>Newgale Beach</b><br>Huge surf beach, good leg‑stretch stop."
    );

    L.marker(solva).addTo(map).bindPopup(
      "<b>Solva</b><br>Harbour village, cafes, coastal views."
    );

    L.marker(stDavids).addTo(map).bindPopup(
      "<b>St Davids</b><br>Small city, cathedral, base for coastal walks."
    );

    L.marker(stDavidsHead).addTo(map).bindPopup(
      "<b>St Davids Head</b><br>Sunset walk with rugged cliffs."
    );

    L.marker(porthgain).addTo(map).bindPopup(
      "<b>Porthgain</b><br>Harbour, coastal path, great pub."
    );

    L.marker(blueLagoon).addTo(map).bindPopup(
      "<b>Blue Lagoon (Abereiddy)</b><br>Dramatic flooded quarry, short walk."
    );

    L.marker(strumbleHead).addTo(map).bindPopup(
      "<b>Strumble Head Lighthouse</b><br>Wild headland, good for sunset or wildlife."
    );

    // --- Day 3: Pembrokeshire → Snowdonia (green) ---
    var day3Coords = [
      stDavids,
      aberglaslyn,
      beddgelert,
      nantGwynant,
      llynDinas,
      capelCurig,
      llynOgwen,
      conwyCastle,
      llandudno
    ];

    var day3Line = L.polyline(day3Coords, {
      color: '#4daf4a',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    L.marker(aberglaslyn).addTo(map).bindPopup(
      "<b>Aberglaslyn Pass</b><br>Short riverside walk through a gorge."
    );

    L.marker(beddgelert).addTo(map).bindPopup(
      "<b>Beddgelert</b><br>Charming village, good lunch stop."
    );

    L.marker(nantGwynant).addTo(map).bindPopup(
      "<b>Nant Gwynant</b><br>One of the best mountain views in Wales."
    );

    L.marker(llynDinas).addTo(map).bindPopup(
      "<b>Llyn Dinas</b><br>Easy lakeside stroll, great reflections."
    );

    L.marker(capelCurig).addTo(map).bindPopup(
      "<b>Capel Curig</b><br>Lakes and dramatic peaks, central Snowdonia."
    );

    L.marker(llynOgwen).addTo(map).bindPopup(
      "<b>Llyn Ogwen</b><br>Classic roadside lake with Tryfan towering above."
    );

    L.marker(conwyCastle).addTo(map).bindPopup(
      "<b>Conwy Castle</b><br>Medieval fortress, harbour and town walls."
    );

    L.marker(llandudno).addTo(map).bindPopup(
      "<b>Llandudno</b><br>Optional seaside evening; Great Orme drive."
    );

    // --- Day 4: Snowdonia → Elan Valley / Brecon (purple) ---
    var day4Coords = [
      llandudno,
      cadairIdris,
      elanValley,
      rhayader,
      brecon,
      hayBluff,
      crickhowell
    ];

    var day4Line = L.polyline(day4Coords, {
      color: '#984ea3',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    L.marker(cadairIdris).addTo(map).bindPopup(
      "<b>Cadair Idris area</b><br>Viewpoint / short walk near Dolgellau."
    );

    L.marker(elanValley).addTo(map).bindPopup(
      "<b>Elan Valley</b><br>Dams, reservoirs, remote scenic driving."
    );

    L.marker(rhayader).addTo(map).bindPopup(
      "<b>Rhayader</b><br>Small town, gateway to Elan Valley."
    );

    L.marker(brecon).addTo(map).bindPopup(
      "<b>Brecon</b><br>Market town, canal basin, base for Beacons."
    );

    L.marker(hayBluff).addTo(map).bindPopup(
      "<b>Hay Bluff</b><br>Short walk with big views over the borderlands."
    );

    L.marker(crickhowell).addTo(map).bindPopup(
      "<b>Crickhowell</b><br>Night 4 stay option; attractive town with pubs."
    );

    // --- Day 5: Crickhowell → MK (orange) ---
    var day5Coords = [
      crickhowell,
      mk
    ];

    var day5Line = L.polyline(day5Coords, {
      color: '#ff7f00',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    // Fit map to all routes
    var allLayers = L.featureGroup([
      day1Line,
      day2Line,
      day3Line,
      day4Line,
      day5Line
    ]);
    map.fitBounds(allLayers.getBounds(), { padding: [20, 20] });

  </script>
</body>
</html>
